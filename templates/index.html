<!DOCTYPE html>
<html>

<head>
  <title>ProPocket AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo">
      🏫 ProfPocket AI
    </div>

    <button onclick="newChat()">+ New Chat</button>
    <button onclick="loadHistory()">📜 History</button>
    <button onclick="clearChat()">🗑 Clear</button>

    <div class="account">
      👤 {{ user }}
    </div>

    <a href="/logout">
      <button class="logout">Logout</button>
    </a>

  </div>

  <!-- MAIN CHAT -->
  <div class="main">

    <div class="topbar">
      ProfPocket AI - Prototype v1
    </div>

    <div id="chat" class="chat"></div>

    <div class="inputbar">

      <input id="msg" placeholder="Ask anything..." />

      <button onclick="send()">➤</button>

    </div>

    <div class="footer">
      <i>by Adam BENABDERRAHMANE — version 1 PROTOTYPE</i>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
