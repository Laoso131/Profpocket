<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>ProfPocket AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo">
      ⚡ ProfPocket AI
    </div>

    <button onclick="newChat()">+ Nouveau chat</button>
    <button onclick="loadHistory()">📜 Historique</button>

    <div class="premium">
      💎 Pass Premium
      <p>IA illimitée + rapide</p>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <h2>Assistant intelligent</h2>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat"></div>

    <!-- INPUT -->
    <div class="inputbar">

      <input id="msg" placeholder="Pose ta question..." />

      <button onclick="send()">➤</button>

    </div>

  </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
