<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<link
rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="login">

<h1>Connexion</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Mot de passe">

<button
onclick="createAccount()">

Créer compte

</button>

</div>

<script>

async function createAccount(){

let email=
document.getElementById(
"email"
).value

let password=
document.getElementById(
"password"
).value

let r=
await fetch(
"/signin",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({
email,
password
})

}

)

let data=
await r.json()

if(data.success){

alert(
"Compte créé"
)

window.location="/"

}

}

</script>

</body>

</html>
