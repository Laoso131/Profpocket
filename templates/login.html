<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>ProfPocket AI - Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="login-container">

  <div class="login-box">

    <h2>ProfPocket AI</h2>

    <input id="username" placeholder="Nom d'utilisateur">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="login()">Se connecter</button>
    <button onclick="register()" style="background:#111;margin-top:8px;">
      Créer un compte
    </button>

    <p id="msg" style="margin-top:10px;font-size:14px;"></p>

    <div style="margin-top:15px;font-size:12px;opacity:0.6;">
      By continuing you accept ProfPocket AI Terms
    </div>

  </div>

</div>

<script>

function show(msg, ok){
  let m = document.getElementById("msg")
  m.innerText = msg
  m.style.color = ok ? "#00ff9d" : "#ff4d6d"
}

async function login(){

  let u = document.getElementById("username").value
  let p = document.getElementById("password").value

  let res = await fetch("/api/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({username:u, password:p})
  })

  let data = await res.json()

  if(data.msg === "ok"){
    show("✔ Connexion réussie", true)
    setTimeout(()=> window.location.href="/", 800)
  }else{
    show("✖ Identifiants incorrects", false)
  }
}

async function register(){

  let u = document.getElementById("username").value
  let p = document.getElementById("password").value

  let res = await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({username:u, password:p})
  })

  let data = await res.json()

  if(data.msg === "created"){
    show("✔ Compte créé", true)
  }else{
    show("⚠ Utilisateur déjà existant", false)
  }
}

</script>

</body>
</html>
